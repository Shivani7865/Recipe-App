<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe App</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <nav>
            <img src="https://png.pngtree.com/template/20191015/ourmid/pngtree-chef-abstract-kitchener-cooky-icon-logo-image_317353.jpg" alt="logo" width="100px" height="97px"/>
           
    <form>
        <input type="text" placeholder="search for recipes....." class="searchBox">
        <button type="submit" class="searchBtn">Search</button>
    </form>
        </nav>
        <div class="splash-container">
            <h1 class="line line1">Craving something amazing? Italian food 🍰</h1>
            <h2 class="line line2">Let’s find it. Let’s cook it. Let’s enjoy it.</h2>
            <h3 class="line line3"> Only on Telescript—where every recipe tells a story 💫.</h3>
          </div>  
        
    </header>
    <main>
    <section>
        <div class="recipe-container">
            <h2>Search your favourite recipes</h2>
            <h2>Let's start ! Hurry Up Guys </h2>
            <img src="https://png.pngtree.com/png-clipart/20250418/original/pngtree-happy-girl-chef-cooking-delicious-food-png-image_20851012.png" wiidth="60%" height="350px">
        </div>
        <div class="recipe-details">
            <button type="button" class="recipe-close-btn">
                <i class="fa-solid fa-xmark"></i>
            </button>
            <div class="recipe-details-content">

            </div>
        </div>
    </section>
    </main>
</body>
<script src="script.js"></script>

</html>
